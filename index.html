<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VANTAGE DISCORD CLIENT</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --bg-main: #313338;
            --bg-darker: #2b2d31;
            --bg-black: #1e1f22;
            --text-normal: #dbdee1;
            --text-muted: #949ba4;
            --brand-color: #5865f2;
        }
        body { background: var(--bg-main); color: var(--text-normal); font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; height: 100vh; display: flex; flex-direction: column; overflow: hidden; margin: 0; }
        
        /* Стили Discord-сообщений */
        .message-group { margin-top: 1.0625rem; padding: 0.125rem 1rem; position: relative; display: flex; gap: 1rem; }
        .message-group:hover { background-color: rgba(0,0,0,0.05); }
        .avatar { width: 40px; height: 40px; border-radius: 50%; background: #5865f2; flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-weight: bold; color: white; }
        .header { display: flex; align-items: center; gap: 0.5rem; }
        .username { color: #f2f3f5; font-weight: 500; cursor: pointer; }
        .timestamp { color: var(--text-muted); font-size: 0.75rem; }
        .text { color: var(--text-normal); font-size: 1rem; line-height: 1.375rem; white-space: pre-wrap; margin-top: 0.125rem; }

        /* Поле ввода как в Discord */
        .input-box { background: #383a40; border-radius: 8px; margin: 0 16px 24px; padding: 10px 16px; display: flex; gap: 12px; align-items: center; }
        .input-box input { background: transparent; border: none; outline: none; color: var(--text-normal); flex: 1; font-size: 1rem; }
        
        .typing-indicator { height: 24px; padding: 0 16px; font-size: 0.75rem; color: var(--text-normal); font-weight: bold; }
        
        /* Стили Markdown */
        b { color: #fff; font-weight: 700; }
        code { background: #2b2d31; padding: 0.2rem; border-radius: 4px; font-family: monospace; }
    </style>
</head>
<body>

    <header class="h-12 bg-darker border-b border-black flex items-center px-4 shadow-sm z-10">
        <i class="fa-solid fa-hashtag text-zinc-500 mr-2 text-xl"></i>
        <span class="font-bold text-white">vantage-chat</span>
    </header>

    <div id="chat" class="flex-1 overflow-y-auto pt-2"></div>

    <div id="typing" class="typing-indicator"></div>

    <div class="bg-main pb-4">
        <div class="input-box">
            <i class="fa-solid fa-circle-plus text-zinc-400 hover:text-white cursor-pointer text-xl"></i>
            <input type="text" id="mInput" placeholder="Написать в #vantage-chat" oninput="isTyping()">
            <div class="flex gap-4 text-zinc-400">
                <i class="fa-solid fa-gift hover:text-white cursor-pointer"></i>
                <i class="fa-solid fa-face-smile hover:text-white cursor-pointer"></i>
                <i class="fa-solid fa-paper-plane text-brand-color cursor-pointer" onclick="send()"></i>
            </div>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        const user = tg.initDataUnsafe.user || { first_name: "Andrey", id: 1 };

        // FIREBASE CONFIG
        const firebaseConfig = {
            apiKey: "AIzaSyBw5zp7yIWJWucAbUVUxpMV4VKXou2P4gQ",
            authDomain: "vantage-chat-227ff.firebaseapp.com",
            projectId: "vantage-chat-227ff",
            storageBucket: "vantage-chat-227ff.firebasestorage.app",
            messagingSenderId: "248387416956",
            appId: "1:248387416956:web:9a8941b86ed9e24ef7aaf9",
            databaseURL: "https://vantage-chat-227ff-default-rtdb.europe-west1.firebasedatabase.app/"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database().ref("messages");
        const typingRef = firebase.database().ref("typing_status");

        function parseMarkdown(text) {
            return text
                .replace(/\*\*(.*?)\*\*/g, '<b>$1</b>')
                .replace(/`(.*?)`/g, '<code>$1</code>')
                .replace(/\*(.*?)\*/g, '<i>$1</i>');
        }

        function send() {
            const input = document.getElementById('mInput');
            const text = input.value.trim();
            if(!text) return;
            
            db.push({
                uId: user.id,
                uName: user.first_name,
                text: text,
                time: new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})
            });
            input.value = '';
            typingRef.child(user.id).remove();
        }

        function isTyping() {
            if(document.getElementById('mInput').value.length > 0) {
                typingRef.child(user.id).set(user.first_name);
                setTimeout(() => typingRef.child(user.id).remove(), 2500);
            }
        }

        db.limitToLast(50).on("child_added", (snap) => {
            const m = snap.val();
            const chat = document.getElementById('chat');
            chat.insertAdjacentHTML('beforeend', `
                <div class="message-group">
                    <div class="avatar">${m.uName[0]}</div>
                    <div class="content">
                        <div class="header"><span class="username">${m.uName}</span><span class="timestamp">${m.time}</span></div>
                        <div class="text">${parseMarkdown(m.text)}</div>
                    </div>
                </div>
            `);
            chat.scrollTop = chat.scrollHeight;
        });

        typingRef.on("value", (snap) => {
            const active = snap.val();
            const display = document.getElementById('typing');
            if(active) {
                const names = Object.values(active).filter(n => n !== user.first_name);
                display.innerText = names.length > 0 ? names.join(", ") + " печатает..." : "";
            } else { display.innerText = ""; }
        });

        document.getElementById('mInput').addEventListener("keypress", (e) => { if(e.key === "Enter") send(); });
    </script>
</body>
</html>
