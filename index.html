<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VANTAGE CONNECT</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <style>
        body { background: #000; color: #fff; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; overflow: hidden; height: 100vh; }
        .screen { display: none; height: calc(100vh - 130px); overflow-y: auto; padding-bottom: 20px; }
        .active-screen { display: flex; flex-direction: column; }
        
        /* Стили сообщений как в ТГ */
        .msg { max-width: 80%; padding: 8px 12px; border-radius: 15px; font-size: 15px; margin-bottom: 4px; position: relative; }
        .my { align-self: flex-end; background: #fff; color: #000; border-bottom-right-radius: 4px; }
        .others { align-self: flex-start; background: #1c1c1d; border-bottom-left-radius: 4px; }
        
        .tab-bar { background: rgba(10, 10, 10, 0.9); backdrop-filter: blur(10px); border-top: 0.5px solid #222; }
        .tab-item { opacity: 0.5; transition: 0.2s; }
        .tab-item.active { opacity: 1; color: #fff; }

        input::placeholder { color: #555; }
        .search-bar { background: #1c1c1d; border-radius: 10px; padding: 8px 12px; margin: 10px; }
    </style>
</head>
<body>

    <div class="p-2 border-b border-zinc-900">
        <div class="search-bar flex items-center gap-2">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#555" stroke-width="2"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
            <input type="text" placeholder="Поиск" class="bg-transparent border-none outline-none text-sm w-full">
        </div>
    </div>

    <div id="screen-chats" class="screen active-screen p-4" id="chat">
        <div id="chat-messages" class="flex flex-col gap-1"></div>
    </div>

    <div id="screen-contacts" class="screen p-6 text-center">
        <div class="w-20 h-20 bg-zinc-800 rounded-full mx-auto mb-4 flex items-center justify-center text-3xl font-bold">V</div>
        <h2 class="text-xl font-bold">Ваши контакты</h2>
        <p class="text-zinc-500 text-sm mt-2">Здесь будут отображаться пользователи VANTAGE CONNECT</p>
    </div>

    <div id="screen-settings" class="screen p-6">
        <div class="flex items-center gap-4 mb-8">
            <div id="user-pfp" class="w-16 h-16 rounded-full bg-white text-black flex items-center justify-center text-2xl font-black">?</div>
            <div>
                <h2 id="user-name" class="text-xl font-bold">User</h2>
                <p class="text-zinc-500 text-sm">@username</p>
            </div>
        </div>
        <div class="bg-zinc-900 rounded-xl overflow-hidden text-sm">
            <div class="p-4 border-b border-zinc-800 flex justify-between"><span>Уведомления</span><span class="text-zinc-500">Вкл.</span></div>
            <div class="p-4 border-b border-zinc-800 flex justify-between"><span>Конфиденциальность</span><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 18l6-6-6-6"/></svg></div>
            <div class="p-4 text-red-500">Выйти</div>
        </div>
    </div>

    <div id="input-wrap" class="fixed bottom-[65px] w-full p-3 bg-black border-t border-zinc-900 flex gap-2">
        <input type="text" id="mInput" placeholder="Сообщение" class="flex-1 bg-zinc-900 rounded-full px-4 py-2 text-sm outline-none">
        <button onclick="send()" class="w-10 h-10 bg-white text-black rounded-full flex items-center justify-center active:scale-90 transition">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><path d="M22 2L11 13M22 2l-7 20-4-9-9-4 20-7z"/></svg>
        </button>
    </div>

    <div class="tab-bar fixed bottom-0 w-full h-[65px] flex justify-around items-center px-4 pb-2">
        <div class="tab-item active flex flex-col items-center gap-1" onclick="showScreen('chats', this)">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path></svg>
            <span class="text-[10px]">Чаты</span>
        </div>
        <div class="tab-item flex flex-col items-center gap-1" onclick="showScreen('contacts', this)">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
            <span class="text-[10px]">Контакты</span>
        </div>
        <div class="tab-item flex flex-col items-center gap-1" onclick="showScreen('settings', this)">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg>
            <span class="text-[10px]">Настройки</span>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        const user = tg.initDataUnsafe.user || { first_name: "Andrey", id: 1 };
        
        document.getElementById('user-name').innerText = user.first_name;
        document.getElementById('user-pfp').innerText = user.first_name[0];

        // ВСТАВЬ ТВОИ КЛЮЧИ ТУТ
        const firebaseConfig = {
            apiKey: "AIzaSyBw5zp7yIWJWucAbUVUxpMV4VKXou2P4gQ",
            authDomain: "vantage-chat-227ff.firebaseapp.com",
            projectId: "vantage-chat-227ff",
            storageBucket: "vantage-chat-227ff.firebasestorage.app",
            messagingSenderId: "248387416956",
            appId: "1:248387416956:web:9a8941b86ed9e24ef7aaf9",
            databaseURL: "https://vantage-chat-227ff-default-rtdb.europe-west1.firebasedatabase.app/"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database().ref("messages");

        function showScreen(name, el) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active-screen'));
            document.querySelectorAll('.tab-item').forEach(t => t.classList.remove('active'));
            document.getElementById('screen-' + name).classList.add('active-screen');
            el.classList.add('active');
            
            // Прячем поле ввода, если мы не в чате
            document.getElementById('input-wrap').style.display = (name === 'chats') ? 'flex' : 'none';
            tg.HapticFeedback.selectionChanged();
        }

        function send() {
            const text = document.getElementById('mInput').value.trim();
            if(!text) return;
            db.push({ uId: user.id, uName: user.first_name, text: text });
            document.getElementById('mInput').value = '';
        }

        db.limitToLast(30).on("child_added", (snap) => {
            const m = snap.val();
            const isMe = m.uId === user.id;
            const chatBox = document.getElementById('chat-messages');
            chatBox.insertAdjacentHTML('beforeend', `
                <div class="msg ${isMe ? 'my' : 'others'}">
                    <div class="text-[10px] opacity-40 mb-1 ${isMe ? 'hidden' : ''}">${m.uName}</div>
                    ${m.text}
                </div>
            `);
            document.getElementById('screen-chats').scrollTop = document.getElementById('screen-chats').scrollHeight;
        });
    </script>
</body>
</html>
